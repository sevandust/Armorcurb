<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Curbing Job Cost Calculator</title>
    <style>
        body { font-family: -apple-system, Helvetica, Arial, sans-serif; margin: 20px; background-color: #f2f2f2; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; border: 1px solid #ccc; }
        h2 { background-color: #2e7d32; color: white; padding: 15px; margin: -20px -20px 20px -20px; border-radius: 10px 10px 0 0; text-align: center; }

        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .col { flex: 1; }
        
        label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #333; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #bbb; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        
        /* FUEL SECTION (Yellow) */
        .fuel-box { background-color: #fff8e1; border: 2px solid #ffecb3; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        
        .btn-map {
            display: block; width: 100%; text-align: center; text-decoration: none;
            background-color: #28a745; color: white; font-weight: bold; font-size: 16px;
            padding: 12px; border-radius: 5px; margin-top: 5px; box-sizing: border-box;
        }
        .note { font-size: 11px; text-align: center; color: #666; margin-top: 5px; font-style: italic; }

        .btn-main {
            width: 100%; padding: 15px; font-size: 18px; font-weight: bold; 
            color: white; background: #2e7d32; border: none; border-radius: 5px; 
            cursor: pointer; margin-top: 20px; margin-bottom: 20px;
        }
        
        .results-box { background-color: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px solid #c8e6c9; }
        .line { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 8px; }
        
        .total-line { border-top: 2px solid #999; margin-top: 15px; padding-top: 10px; font-size: 20px; font-weight: bold; color: #c62828; }
        .profit-line { font-size: 22px; font-weight: bold; color: #1b5e20; }
        
        hr { border: 0; border-top: 1px solid #ddd; margin: 20px 0; }
    </style>
</head>
<body>

<div class="box">
    <h2>Curbing Job Cost Calculator</h2>

    <div class="fuel-box">
        <label style="color:#f57f17;">1. Travel Calculator</label>
        <input type="text" id="custAddr" placeholder="Enter Job City or Zip" oninput="updateMapLink()">
        <a id="mapLink" href="#" target="_blank" class="btn-map">Open Maps from Solon Springs</a>
        
        <div class="row" style="margin-top:15px;">
            <div class="col">
                <label>Round Trip Miles</label>
                <input type="number" id="miles" placeholder="0" oninput="calcFuel()">
            </div>
            <div class="col">
                <label>Price Per Gal ($)</label>
                <input type="number" id="pricePerGal" value="4.00" oninput="calcFuel()">
            </div>
        </div>
        
        <div class="row">
            <div class="col">
                <label>Fuel Cost ($)</label>
                <input type="number" id="calcTripCost" readonly style="background:#eee; font-weight:bold; color:#c62828;">
            </div>
        </div>
        <div class="note">Auto-calc: Total Miles ÷ 8 mpg × Price Per Gal</div>
    </div>

    <label>Job Revenue</label>
    <div class="row">
        <div class="col">
            <label>Total Linear Feet</label>
            <input type="number" id="linft" value="100">
        </div>
        <div class="col">
            <label>Price Per Foot ($)</label>
            <input type="number" id="pricePerFt" value="15">
        </div>
    </div>
    <div class="row">
        <div class="col">
            <label>Misc Revenue 1 ($)</label>
            <input type="number" id="miscRev1" placeholder="Ex: Prep Fee">
        </div>
        <div class="col">
            <label>Misc Revenue 2 ($)</label>
            <input type="number" id="miscRev2" placeholder="Ex: Sealer Charge">
        </div>
    </div>

    <input type="hidden" id="finalFuel" value="0">

    <hr>
    <label>Labor Costs (Actual Total Pay)</label>
    <div class="row">
        <div class="col"><input type="number" id="l1" placeholder="Employee 1"></div>
        <div class="col"><input type="number" id="l2" placeholder="Employee 2"></div>
    </div>
    <div class="row">
        <div class="col"><input type="number" id="l3" placeholder="Employee 3"></div>
        <div class="col"><input type="number" id="l4" placeholder="Employee 4"></div>
    </div>
    <div class="row">
        <div class="col"><input type="number" id="l5" placeholder="Employee 5"></div>
        <div class="col">
            <label style="color:#2e7d32;">Sealing Labor ($)</label>
            <input type="number" id="lSeal" placeholder="Sealing Pay">
        </div>
    </div>

    <hr>
    <label>Direct Costs</label>
    <div class="row">
        <div class="col"><label>Material $/ft</label><input type="number" id="cMatPerFt" value="1.46"></div>
        <div class="col"><label>Misc Overhead ($)</label><input type="number" id="misc" value="50"></div>
    </div>

    <button class="btn-main" onclick="run()">UPDATE / CALCULATE</button>

    <div class="results-box">
        <div class="line"><span>Total Gross Revenue:</span> <span id="rGross">$0.00</span></div>
        <div class="line"><span>Materials:</span> <span id="rMat">$0.00</span></div>
        <div class="line"><span>Labor Total:</span> <span id="rLabor">$0.00</span></div>
        <div class="line"><span>Fuel:</span> <span id="rFuel">$0.00</span></div>
        <div class="line"><span>Misc Overhead:</span> <span id="rOver">$0.00</span></div>
        
        <div class="total-line line"><span>Total Expenses:</span> <span id="rTotal">$0.00</span></div>
        <div class="profit-line line" style="margin-top:10px;"><span>Net Profit:</span> <span id="rProfit">$0.00</span></div>
        <div style="text-align:right; margin-top:5px; font-weight:bold; font-size:18px;" id="rMargin">Margin: 0%</div>
    </div>
</div>

<script>
    function updateMapLink() {
        var addr = document.getElementById('custAddr').value;
        var origin = "52020 E Robinson Lake Rd, Solon Springs, WI 54873";
        var url = "https://www.google.com/maps/dir/" + encodeURIComponent(origin) + "/" + encodeURIComponent(addr) + "/" + encodeURIComponent(origin);
        document.getElementById('mapLink').href = url;
    }

    function calcFuel() {
        var miles = parseFloat(document.getElementById('miles').value) || 0;
        var ppg = parseFloat(document.getElementById('pricePerGal').value) || 4.00;
        
        var cost = (miles / 8) * ppg;
        document.getElementById('calcTripCost').value = cost.toFixed(2);
        document.getElementById('finalFuel').value = cost.toFixed(2);
    }

    function run() {
        function val(id) { return parseFloat(document.getElementById(id).value) || 0; }
        function set(id, n) { document.getElementById(id).innerText = "$" + n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

        var linft = val('linft');
        var pricePerFt = val('pricePerFt');
        var miscRev = val('miscRev1') + val('miscRev2');
        var gross = (linft * pricePerFt) + miscRev;
        
        var fuel = val('finalFuel');
        var labor = val('l1') + val('l2') + val('l3') + val('l4') + val('l5') + val('lSeal');
        var costMat = linft * val('cMatPerFt');
        var overhead = val('misc');

        var totalExp = costMat + labor + fuel + overhead;
        var profit = gross - totalExp;
        var margin = gross > 0 ? (profit / gross) * 100 : 0;

        set('rGross', gross);
        set('rMat', costMat);
        set('rLabor', labor);
        set('rFuel', fuel);
        set('rOver', overhead);
        set('rTotal', totalExp);
        set('rProfit', profit);
        document.getElementById('rMargin').innerText = "Margin: " + margin.toFixed(1) + "%";
    }
    updateMapLink();
</script>

</body>
</html>
