<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Armor Curbing | Job Cost Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 24px 16px 48px;
        }

        .box {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 0 60px rgba(46, 213, 115, 0.08);
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1a6b2f 0%, #2ed573 100%);
            padding: 28px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 160px; height: 160px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -60px; left: -20px;
            width: 200px; height: 200px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }
        .header-eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        /* BODY */
        .body { padding: 24px; }

        /* SECTION LABELS */
        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #2ed573;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #222;
        }

        /* FUEL BOX */
        .fuel-box {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-left: 3px solid #f0a500;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 28px;
        }
        .fuel-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #f0a500;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fuel-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2a;
        }

        .btn-map {
            display: block;
            width: 100%;
            text-align: center;
            text-decoration: none;
            background: linear-gradient(135deg, #1a6b2f, #2ed573);
            color: white;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            padding: 13px;
            border-radius: 8px;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-map:hover { opacity: 0.85; }

        /* INPUTS */
        .row { display: flex; gap: 12px; margin-bottom: 14px; }
        .col { flex: 1; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #eee;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }
        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #2ed573;
            box-shadow: 0 0 0 3px rgba(46, 213, 115, 0.1);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; }

        input[readonly] {
            background: #141414;
            color: #ff6b6b;
            font-weight: 700;
            border-color: #2a2a2a;
            cursor: default;
        }

        .note {
            font-size: 11px;
            text-align: center;
            color: #444;
            margin-top: 6px;
            font-style: italic;
        }

        hr {
            border: 0;
            border-top: 1px solid #1e1e1e;
            margin: 24px 0;
        }

        /* GAS PRICE — highlighted editable field */
        .gas-field input {
            border-color: #f0a500;
            color: #f0a500;
            font-weight: 700;
        }
        .gas-field input:focus {
            border-color: #f0a500;
            box-shadow: 0 0 0 3px rgba(240, 165, 0, 0.15);
        }
        .gas-field label { color: #f0a500; }

        /* CALCULATE BUTTON */
        .btn-main {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #0a0a0a;
            background: linear-gradient(135deg, #2ed573, #1db954);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 24px;
            margin-bottom: 24px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 20px rgba(46, 213, 115, 0.3);
        }
        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(46, 213, 115, 0.45);
        }
        .btn-main:active { transform: translateY(0); }

        /* RESULTS */
        .results-box {
            background: #141414;
            border: 1px solid #222;
            border-radius: 14px;
            overflow: hidden;
        }
        .results-header {
            background: #1a1a1a;
            padding: 14px 18px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #444;
            border-bottom: 1px solid #222;
        }
        .results-body { padding: 18px; }

        .line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: #888;
            margin-bottom: 10px;
        }
        .line span:last-child { color: #ccc; font-weight: 600; }

        .divider { border: 0; border-top: 1px solid #222; margin: 14px 0; }

        .total-line {
            display: flex;
            justify-content: space-between;
            font-size: 17px;
            font-weight: 700;
            color: #ff6b6b;
            margin-bottom: 12px;
        }

        .profit-line {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 800;
            color: #2ed573;
            margin-bottom: 8px;
        }

        .margin-line {
            text-align: right;
            font-size: 14px;
            font-weight: 700;
            color: #555;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <div class="header-eyebrow">Armor Curbing</div>
        <h1>Job Cost Calculator</h1>
    </div>

    <div class="body">

        <!-- TRAVEL -->
        <div class="fuel-box">
            <div class="fuel-label">⛽ Travel Calculator</div>

            <input type="text" id="custAddr" placeholder="Enter Job City or ZIP" oninput="updateMapLink()">
            <a id="mapLink" href="#" target="_blank" class="btn-map">📍 Open Maps from Solon Springs</a>

            <div class="row" style="margin-top:16px;">
                <div class="col">
                    <label>Round Trip Miles</label>
                    <input type="number" id="miles" placeholder="0" oninput="calcFuel()">
                </div>
                <div class="col gas-field">
                    <label>Gas Price / Gal ($)</label>
                    <input type="text" id="pricePerGal" placeholder="e.g. 3.49" oninput="calcFuel()">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>Fuel Cost ($)</label>
                    <input type="number" id="calcTripCost" readonly>
                </div>
            </div>
            <div class="note">Miles ÷ 8 mpg × Gas Price</div>
        </div>

        <!-- REVENUE -->
        <div class="section-label">Job Revenue</div>
        <div class="row">
            <div class="col">
                <label>Total Linear Feet</label>
                <input type="number" id="linft" value="100">
            </div>
            <div class="col">
                <label>Price Per Foot ($)</label>
                <input type="number" id="pricePerFt" value="15">
            </div>
        </div>
        <div class="row">
            <div class="col">
                <label>Misc Revenue 1 ($)</label>
                <input type="number" id="miscRev1" placeholder="Ex: Prep Fee">
            </div>
            <div class="col">
                <label>Misc Revenue 2 ($)</label>
                <input type="number" id="miscRev2" placeholder="Ex: Sealer Charge">
            </div>
        </div>

        <input type="hidden" id="finalFuel" value="0">
        <hr>

        <!-- LABOR -->
        <div class="section-label">Labor Costs</div>
        <div class="row">
            <div class="col"><input type="number" id="l1" placeholder="Employee 1" oninput="saveLabor()"></div>
            <div class="col"><input type="number" id="l2" placeholder="Employee 2" oninput="saveLabor()"></div>
        </div>
        <div class="row">
            <div class="col"><input type="number" id="l3" placeholder="Employee 3" oninput="saveLabor()"></div>
            <div class="col"><input type="number" id="l4" placeholder="Employee 4" oninput="saveLabor()"></div>
        </div>
        <div class="row">
            <div class="col"><input type="number" id="l5" placeholder="Employee 5" oninput="saveLabor()"></div>
            <div class="col">
                <label style="color:#2ed573;">Sealing Labor ($)</label>
                <input type="number" id="lSeal" placeholder="Sealing Pay" oninput="saveLabor()">
            </div>
        </div>

        <hr>

        <!-- COSTS -->
        <div class="section-label">Direct Costs</div>
        <div class="row">
            <div class="col">
                <label>Material $/ft</label>
                <input type="number" id="cMatPerFt" value="1.46">
            </div>
            <div class="col">
                <label>Misc Overhead ($)</label>
                <input type="number" id="misc" value="50">
            </div>
        </div>

        <button class="btn-main" onclick="run()">Update / Calculate</button>

        <!-- RESULTS -->
        <div class="results-box">
            <div class="results-header">Job Summary</div>
            <div class="results-body">
                <div class="line"><span>Gross Revenue</span> <span id="rGross">$0.00</span></div>
                <div class="line"><span>Materials</span> <span id="rMat">$0.00</span></div>
                <div class="line"><span>Labor</span> <span id="rLabor">$0.00</span></div>
                <div class="line"><span>Fuel</span> <span id="rFuel">$0.00</span></div>
                <div class="line"><span>Misc Overhead</span> <span id="rOver">$0.00</span></div>
                <hr class="divider">
                <div class="total-line"><span>Total Expenses</span> <span id="rTotal">$0.00</span></div>
                <div class="profit-line"><span>Net Profit</span> <span id="rProfit">$0.00</span></div>
                <div class="margin-line" id="rMargin">Margin: 0%</div>
            </div>
        </div>

    </div>
</div>

<script>
    // --- MAP ---
    function updateMapLink() {
        var addr = document.getElementById('custAddr').value;
        var origin = "52020 E Robinson Lake Rd, Solon Springs, WI 54873";
        var url = "https://www.google.com/maps/dir/" + encodeURIComponent(origin) + "/" + encodeURIComponent(addr) + "/" + encodeURIComponent(origin);
        document.getElementById('mapLink').href = url;
    }

    // --- FUEL ---
    function calcFuel() {
        var miles = parseFloat(document.getElementById('miles').value) || 0;
        var ppg = parseFloat(document.getElementById('pricePerGal').value) || 0;
        var cost = (miles / 8) * ppg;
        document.getElementById('calcTripCost').value = cost.toFixed(2);
        document.getElementById('finalFuel').value = cost.toFixed(2);
    }

    // --- LABOR MEMORY (localStorage) ---
    var laborIds = ['l1', 'l2', 'l3', 'l4', 'l5', 'lSeal'];

    function saveLabor() {
        laborIds.forEach(function(id) {
            var val = document.getElementById(id).value;
            if (val) localStorage.setItem('curbing_' + id, val);
            else localStorage.removeItem('curbing_' + id);
        });
    }

    function loadLabor() {
        laborIds.forEach(function(id) {
            var saved = localStorage.getItem('curbing_' + id);
            if (saved) document.getElementById(id).value = saved;
        });
    }

    // --- CALCULATE ---
    function run() {
        function val(id) { return parseFloat(document.getElementById(id).value) || 0; }
        function set(id, n) {
            document.getElementById(id).innerText = "$" + n.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        var linft = val('linft');
        var gross = (linft * val('pricePerFt')) + val('miscRev1') + val('miscRev2');
        var fuel = val('finalFuel');
        var labor = val('l1') + val('l2') + val('l3') + val('l4') + val('l5') + val('lSeal');
        var costMat = linft * val('cMatPerFt');
        var overhead = val('misc');
        var totalExp = costMat + labor + fuel + overhead;
        var profit = gross - totalExp;
        var margin = gross > 0 ? (profit / gross) * 100 : 0;

        set('rGross', gross);
        set('rMat', costMat);
        set('rLabor', labor);
        set('rFuel', fuel);
        set('rOver', overhead);
        set('rTotal', totalExp);
        set('rProfit', profit);
        document.getElementById('rMargin').innerText = "Margin: " + margin.toFixed(1) + "%";
    }

    // --- INIT ---
    updateMapLink();
    loadLabor();
</script>

</body>
</html>
